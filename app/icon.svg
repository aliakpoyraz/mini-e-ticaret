<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="premiumGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(256, 256) scale(0.9) translate(-256, -256)" filter="url(#premiumGlow)">
    <!-- Base geometric structure representing an abstract 'Y' / Sparkle / Tech form -->
    <path d="M 256 64 
             C 256 160, 200 240, 96 256
             C 200 272, 256 352, 256 448
             C 256 352, 312 272, 416 256
             C 312 240, 256 160, 256 64 Z" 
          fill="url(#brandGradient)" />
          
    <!-- Inner dimensional highlight -->
    <path d="M 256 128 
             C 256 192, 218 240, 144 256
             C 218 272, 256 320, 256 384
             C 256 320, 294 272, 368 256
             C 294 240, 256 192, 256 128 Z" 
          fill="#3b82f6" 
          opacity="0.5" />
          
    <circle cx="256" cy="256" r="32" fill="#ffffff" />
  </g>
</svg>
